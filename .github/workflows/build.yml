name: Build Plugin

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven
        run: mvn clean package -DskipTests

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: AllayCosmetics
          path: target/*.jar
